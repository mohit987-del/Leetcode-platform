<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}CodeArena{% endblock %}</title>
  <script src="https://unpkg.com/htmx.org@1.9.12"></script>
  <style>
    :root {
      --bg: #f7f3eb;
      --surface: #fffaf2;
      --surface-strong: #fff;
      --ink: #1d2a35;
      --muted: #63717f;
      --accent: #d55d3f;
      --accent-deep: #9e2f13;
      --line: #e7dcca;
      --success: #2d8a60;
      --warning: #d18b11;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: Georgia, "Times New Roman", serif;
      background: radial-gradient(circle at top, #fff8ee 0%, var(--bg) 55%, #efe3d2 100%);
      color: var(--ink);
    }
    a { color: inherit; text-decoration: none; }
    .shell {
      width: min(1100px, calc(100% - 2rem));
      margin: 0 auto;
    }
    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 1rem 0;
    }
    .brand {
      font-size: 1.5rem;
      font-weight: 700;
      letter-spacing: 0.03em;
    }
    .nav {
      display: flex;
      gap: 1rem;
      align-items: center;
    }
    .button, button {
      border: 1px solid var(--accent-deep);
      background: var(--accent);
      color: white;
      padding: 0.75rem 1rem;
      border-radius: 999px;
      cursor: pointer;
      font-size: 0.95rem;
    }
    .button.secondary {
      background: transparent;
      color: var(--accent-deep);
    }
    .hero, .panel {
      background: rgba(255, 255, 255, 0.82);
      backdrop-filter: blur(4px);
      border: 1px solid var(--line);
      border-radius: 24px;
      box-shadow: 0 12px 30px rgba(61, 42, 19, 0.08);
    }
    .hero {
      padding: 3rem;
      margin: 2rem 0 3rem;
    }
    .panel {
      padding: 1.5rem;
    }
    .kicker {
      color: var(--accent-deep);
      text-transform: uppercase;
      letter-spacing: 0.12em;
      font-size: 0.8rem;
    }
    .muted { color: var(--muted); }
    .grid {
      display: grid;
      gap: 1.5rem;
      grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
    }
    .stack { display: grid; gap: 1rem; }
    input, textarea, select {
      width: 100%;
      padding: 0.85rem 1rem;
      border-radius: 16px;
      border: 1px solid var(--line);
      background: var(--surface-strong);
      font: inherit;
    }
    .auth-card {
      width: min(480px, calc(100% - 2rem));
      margin: 3rem auto;
      padding: 2rem;
    }
    .section-title {
      margin: 0 0 0.5rem;
      font-size: 2rem;
    }
  </style>
</head>
<body>
  <div class="shell">
    <header class="topbar">
      <a class="brand" href="{% url 'landing' %}">CodeArena</a>
      <nav class="nav">
        <a href="{% url 'landing' %}">Home</a>
        {% if user.is_authenticated %}
          <a href="{% url 'dashboard:home' %}">Dashboard</a>
          <a href="{% url 'accounts:profile' %}">Profile</a>
          <form action="{% url 'accounts:logout' %}" method="post">
            {% csrf_token %}
            <button type="submit" class="button secondary">Logout</button>
          </form>
        {% else %}
          <a href="{% url 'accounts:login' %}" class="button secondary">Login</a>
          <a href="{% url 'accounts:signup' %}" class="button">Sign up</a>
        {% endif %}
      </nav>
    </header>
    {% block content %}{% endblock %}
  </div>
</body>
</html>
